<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a7a3e;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0f1e14"/>

  <!-- Green gradient inner background -->
  <rect x="4" y="4" width="92" height="92" rx="18" ry="18" fill="url(#bg)"/>

  <!-- White leaf icon — centered at 50,50 -->
  <g transform="translate(50,52)" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Leaf outer shape -->
    <path d="M0 22 C-18 8, -22 -16, 0 -24 C22 -16, 18 8, 0 22Z" fill="white" stroke="none"/>
    <!-- Stem -->
    <path d="M0 22 L0 30" stroke="white" stroke-width="4" fill="none"/>
    <!-- Vein down center -->
    <path d="M0 -20 L0 20" stroke="#2ecc71" stroke-width="2.5" fill="none"/>
    <!-- Left vein -->
    <path d="M0 2 L-10 -6" stroke="#2ecc71" stroke-width="2" fill="none"/>
    <!-- Right vein -->
    <path d="M0 2 L10 -6" stroke="#2ecc71" stroke-width="2" fill="none"/>
  </g>
</svg>